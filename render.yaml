services:
  - type: web
    name: quote-calculator
    env: node
    plan: free
    buildCommand: npm ci --omit=dev && node -e "require('@sparticuz/chromium').executablePath().then(() => console.log('Chromium binary ready')).catch(e => { console.error(e); process.exit(1); })"
    startCommand: npm start
    healthCheckPath: /health
    envVars:
      - key: NODE_VERSION
        value: "20.18.0"
      - key: NODE_ENV
        value: production
      - key: USE_SERVERLESS_CHROMIUM
        value: "true"
      - key: PUPPETEER_SKIP_DOWNLOAD
        value: "true"
      - key: PUPPETEER_SKIP_CHROMIUM_DOWNLOAD
        value: "true"