<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reports - LumQuote</title>
    <link rel="stylesheet" href="design-tokens.css">
    <link rel="stylesheet" href="components.css">
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="phase4.css">
    <link rel="stylesheet" href="phase5.css">
    <link rel="icon" href="/assets/logo.png" type="image/png">
</head>
<body data-app-page="reports" data-app-title="Reports" data-app-subtitle="View insights and trends across your quotes">
    <div class="container">
        <main class="main-content reports-page">
            <div class="reports-sticky-filters">
            <div class="filters-bar">
                <div class="filter-group">
                    <label for="timePreset">Time Period:</label>
                    <select id="timePreset" onchange="reportsManager.handleTimePresetChange()">
                        <option value="current-month">Current Month</option>
                        <option value="last-month">Last Month</option>
                        <option value="current-quarter">Current Quarter</option>
                        <option value="current-year">Current Year</option>
                        <option value="last-year">Last Year</option>
                        <option value="all-time">All Time</option>
                        <option value="custom">Custom Range</option>
                    </select>
                </div>

                <div class="filter-group date-range-inputs" id="customDateRange">
                    <input type="date" id="startDate" onchange="reportsManager.loadReports()">
                    <span>to</span>
                    <input type="date" id="endDate" onchange="reportsManager.loadReports()">
                </div>

                <div class="filter-group">
                    <label for="bookedFilter">Status:</label>
                    <select id="bookedFilter" onchange="reportsManager.loadReports()">
                        <option value="all">All Quotes</option>
                        <option value="true">Booked Only</option>
                        <option value="false">Not Booked</option>
                    </select>
                </div>
            </div>
            </div>

            <!-- Summary Cards -->
            <div class="summary-cards" id="summaryCards">
                <div class="summary-card">
                    <div class="label">Total Quotes</div>
                    <div class="value" id="totalQuotes">-</div>
                </div>
                <div class="summary-card">
                    <div class="label">Invoice Total</div>
                    <div class="value currency" id="totalInvoice">-</div>
                </div>
                <div class="summary-card">
                    <div class="label">Booked</div>
                    <div class="value" id="bookedCount">-</div>
                    <div class="subtext" id="conversionRate"></div>
                </div>
                <div class="summary-card">
                    <div class="label">Not Booked</div>
                    <div class="value" id="notBookedCount">-</div>
                </div>
            </div>

            <!-- Report Cards Grid -->
            <div class="reports-grid">
                <!-- Top Clients by Amount -->
                <div class="report-card">
                    <div class="report-card-header">
                        <h3>💰 Top Clients by Revenue</h3>
                    </div>
                    <div class="report-card-body" id="topClientsByAmount">
                        <div class="loading-spinner"></div>
                    </div>
                </div>

                <!-- Top Clients by Count -->
                <div class="report-card">
                    <div class="report-card-header">
                        <h3>🏆 Most Events by Client</h3>
                    </div>
                    <div class="report-card-body" id="topClientsByCount">
                        <div class="loading-spinner"></div>
                    </div>
                </div>

                <!-- Top Cities -->
                <div class="report-card">
                    <div class="report-card-header">
                        <h3>🏙️ Top Cities</h3>
                    </div>
                    <div class="report-card-body" id="topCities">
                        <div class="loading-spinner"></div>
                    </div>
                </div>

                <!-- Top Sources -->
                <div class="report-card">
                    <div class="report-card-header">
                        <h3>📣 Top Lead Sources</h3>
                    </div>
                    <div class="report-card-body" id="topSources">
                        <div class="loading-spinner"></div>
                    </div>
                </div>

                <!-- Top Categories -->
                <div class="report-card">
                    <div class="report-card-header">
                        <h3>📂 Top Categories</h3>
                    </div>
                    <div class="report-card-body" id="topCategories">
                        <div class="loading-spinner"></div>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script src="toasts.js"></script>
    <script src="a11y.js"></script>
    <script src="modals.js"></script>
    <script src="shell.js"></script>
    <script src="lumdash-integration.js"></script>
    <script src="reports.js"></script>
</body>
</html>
