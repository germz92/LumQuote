<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - LumQuote</title>
    <link rel="icon" href="/assets/logo.png" type="image/png">
    <link rel="stylesheet" href="design-tokens.css">
    <link rel="stylesheet" href="login.css">
</head>
<body class="login-page">
    <div class="login-container">
        <div class="login-card">
            <div class="login-header">
                <img src="/assets/logo.png" alt="Lumetry Media" class="login-logo">
                <h1 class="login-title">LumQuote</h1>
                <p class="login-subtitle">Sign in with your LumDash account to build and manage quotes</p>
            </div>

            <div id="errorMessage" class="login-message login-message--error" role="alert"></div>
            <div id="successMessage" class="login-message login-message--success" role="status"></div>
            <div id="loadingMessage" class="login-message login-message--loading" aria-live="polite">
                <span class="login-spinner" aria-hidden="true"></span>
                <span>Verifying your account...</span>
            </div>

            <a href="javascript:void(0)" class="login-lumdash-button" id="lumdashButton" onclick="signInWithLumDash(); return false;">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                    <path d="M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4"/>
                    <polyline points="10 17 15 12 10 7"/>
                    <line x1="15" y1="12" x2="3" y2="12"/>
                </svg>
                Sign in with LumDash
            </a>

            <div class="login-footer">
                <p>Don't have a LumDash account?</p>
                <p><a href="https://lumdash.app" target="_blank" rel="noopener noreferrer">Create one at lumdash.app</a></p>
            </div>
        </div>
    </div>

    <script>
        const IS_LOCAL = (window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1');
        const LUMDASH_API = 'https://lumdash2-0.onrender.com';
        const LUMDASH_URL = 'https://beta.lumdash.app';
        const LUMQUOTE_CALLBACK = window.location.origin + '/login';

        let isRedirecting = false;

        document.addEventListener('DOMContentLoaded', () => {
            const urlParams = new URLSearchParams(window.location.search);
            const token = urlParams.get('token');
            const error = urlParams.get('error');

            if (error) {
                showError(decodeURIComponent(error));
                window.history.replaceState({}, document.title, '/login');
                return;
            }

            if (token) {
                window.history.replaceState({}, document.title, '/login');
                verifyAndLogin(token);
                return;
            }

            checkExistingSession();
        });

        async function checkExistingSession() {
            if (isRedirecting) return;

            try {
                const response = await fetch('/api/me', {
                    credentials: 'include'
                });

                if (response.ok) {
                    const data = await response.json();
                    if (data.user) {
                        localStorage.setItem('user', JSON.stringify(data.user));
                    }
                    isRedirecting = true;
                    window.location.replace('/quotes');
                } else {
                    localStorage.removeItem('authToken');
                    localStorage.removeItem('user');
                }
            } catch (e) {
                console.log('Session check failed:', e.message);
            }
        }

        function signInWithLumDash() {
            const callbackUrl = encodeURIComponent(LUMQUOTE_CALLBACK);
            const redirectUrl = `${LUMDASH_API}/auth/redirect?callback=${callbackUrl}&app=lumquote`;
            window.location.replace(redirectUrl);
        }

        async function verifyAndLogin(token) {
            showLoading();

            try {
                const response = await fetch('/api/auth/lumdash', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({ token }),
                });

                const data = await response.json();

                if (data.success) {
                    localStorage.setItem('authToken', token);
                    localStorage.setItem('user', JSON.stringify(data.user));

                    showSuccess('Welcome, ' + data.user.name + '! Redirecting...');

                    setTimeout(() => {
                        window.location.href = '/quotes';
                    }, 1000);
                } else {
                    showError(data.message || 'Authentication failed. Please try again.');
                }
            } catch (error) {
                console.error('Auth error:', error);
                showError('Authentication failed. Please try again.');
            }
        }

        function showError(message) {
            document.getElementById('loadingMessage').style.display = 'none';
            document.getElementById('successMessage').style.display = 'none';
            const errorEl = document.getElementById('errorMessage');
            errorEl.textContent = message;
            errorEl.style.display = 'block';
        }

        function showSuccess(message) {
            document.getElementById('loadingMessage').style.display = 'none';
            document.getElementById('errorMessage').style.display = 'none';
            const successEl = document.getElementById('successMessage');
            successEl.textContent = message;
            successEl.style.display = 'block';
        }

        function showLoading() {
            document.getElementById('errorMessage').style.display = 'none';
            document.getElementById('successMessage').style.display = 'none';
            document.getElementById('loadingMessage').style.display = 'flex';
        }
    </script>
</body>
</html>
