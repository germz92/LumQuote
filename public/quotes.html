<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quotes - LumQuote</title>
    <link rel="stylesheet" href="design-tokens.css">
    <link rel="stylesheet" href="components.css">
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="phase2.css">
    <link rel="stylesheet" href="phase5.css">
    <link rel="icon" href="/assets/lumquote_transparent_favicon.png" type="image/png">
</head>
<body data-app-page="quotes" data-app-title="Quotes" data-app-subtitle="Load, archive, or delete saved quotes" data-app-new-quote="true">
    <div class="container">
        <main class="main-content">
            <div class="quotes-page-section">
                <!-- Sticky chrome: filters stay pinned; ::before masks scroll bleed above -->
                <div class="quotes-sticky-chrome">
                <div class="quotes-controls-header">
                    <div class="search-filter-controls">
                        <input type="text" 
                               id="searchQuotes" 
                               class="search-input" 
                               placeholder="Search quotes by name, client, or location..." 
                               oninput="quotesManager.debouncedSearch()">
                        
                        <select id="sortQuotes" 
                                class="sort-select" 
                                onchange="quotesManager.filterAndSort()">
                            <option value="created-newest" selected>Created (Newest)</option>
                            <option value="created-oldest">Created (Oldest)</option>
                            <option value="service-date-newest">Service Date (Newest)</option>
                            <option value="service-date-oldest">Service Date (Oldest)</option>
                            <option value="newest">Updated (Newest)</option>
                            <option value="oldest">Updated (Oldest)</option>
                            <option value="name-asc">Name (A-Z)</option>
                            <option value="name-desc">Name (Z-A)</option>
                        </select>

                        <input type="date" 
                               id="dateFilter" 
                               class="date-filter" 
                               placeholder="Filter by service date"
                               onchange="quotesManager.filterAndSort()">
                        
                        <select id="userFilter" 
                                class="user-filter" 
                                onchange="quotesManager.filterAndSort()">
                            <option value="">All Users</option>
                            <!-- Users will be loaded here -->
                        </select>
                        
                        <select id="bookedFilter" 
                                class="booked-filter" 
                                onchange="quotesManager.filterAndSort()">
                            <option value="">All Quotes</option>
                            <option value="true">Booked</option>
                            <option value="false">Not Booked</option>
                        </select>
                        
                        <button class="clear-filters-btn" 
                                id="clearFiltersBtn" 
                                onclick="quotesManager.clearFilters()" 
                                style="display: none;">
                            Clear Filters
                        </button>
                    </div>

                    <div class="quotes-toolbar">
                        <div class="quotes-toolbar-group" role="group" aria-label="View options">
                            <button type="button"
                                    class="quotes-toolbar-btn"
                                    id="viewToggleBtn"
                                    onclick="quotesManager.toggleView()"
                                    title="Toggle grid and list view">
                                <span class="quotes-toolbar-btn__icon" aria-hidden="true">
                                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" id="viewToggleIcon">
                                        <line x1="8" y1="6" x2="21" y2="6"></line>
                                        <line x1="8" y1="12" x2="21" y2="12"></line>
                                        <line x1="8" y1="18" x2="21" y2="18"></line>
                                        <line x1="3" y1="6" x2="3.01" y2="6"></line>
                                        <line x1="3" y1="12" x2="3.01" y2="12"></line>
                                        <line x1="3" y1="18" x2="3.01" y2="18"></line>
                                    </svg>
                                </span>
                                <span class="quotes-toolbar-btn__label" id="viewToggleText">Grid View</span>
                            </button>
                            <button type="button"
                                    class="quotes-toolbar-btn"
                                    id="archiveToggleBtn"
                                    onclick="quotesManager.toggleArchiveView()"
                                    title="View archived quotes">
                                <span class="quotes-toolbar-btn__icon" aria-hidden="true">
                                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                        <path d="M21 8v13H3V8"></path>
                                        <path d="M1 3h22v5H1z"></path>
                                        <path d="M10 12h4"></path>
                                    </svg>
                                </span>
                                <span class="quotes-toolbar-btn__label" id="archiveToggleText">View Archived</span>
                            </button>
                        </div>
                    </div>
                </div>
                </div>

                <div id="quotesDataArea" class="quotes-data-area">
                    <div id="quotesSkeleton" class="quotes-skeleton" hidden aria-hidden="true"></div>

                    <!-- Quotes list view (default) -->
                    <div class="quotes-list-scroll">
                    <div id="quotesListView" class="quotes-list-view">
                        <table class="quotes-table">
                            <thead>
                                <tr>
                                    <th class="sortable" onclick="quotesManager.sortByColumn('title')">
                                        Quote Title <span class="sort-indicator"></span>
                                    </th>
                                    <th class="sortable" onclick="quotesManager.sortByColumn('client')">
                                        Client <span class="sort-indicator"></span>
                                    </th>
                                    <th class="sortable col-hide-sm" onclick="quotesManager.sortByColumn('location')">
                                        Location <span class="sort-indicator"></span>
                                    </th>
                                    <th class="sortable col-hide-sm" onclick="quotesManager.sortByColumn('owner')">
                                        Owner <span class="sort-indicator"></span>
                                    </th>
                                    <th class="sortable" onclick="quotesManager.sortByColumn('date')">
                                        Service Date <span class="sort-indicator"></span>
                                    </th>
                                    <th class="sortable col-hide-sm" onclick="quotesManager.sortByColumn('created')">
                                        Created <span class="sort-indicator"></span>
                                    </th>
                                    <th class="sortable col-hide-sm" onclick="quotesManager.sortByColumn('modified')">
                                        Modified <span class="sort-indicator"></span>
                                    </th>
                                    <th class="sortable" onclick="quotesManager.sortByColumn('total')">
                                        Total <span class="sort-indicator"></span>
                                    </th>
                                    <th>Actions</th>
                                </tr>
                            </thead>
                            <tbody id="quotesTableBody">
                                <!-- Quotes rows will be loaded here -->
                            </tbody>
                        </table>
                    </div>
                    </div>

                    <!-- Quotes grid view -->
                    <div id="quotesContainer" class="quotes-grid" style="display: none;">
                        <!-- Quotes will be loaded here -->
                    </div>
                </div>
                
                <!-- Pagination -->
                <div id="paginationContainer" class="pagination-container">
                    <!-- Pagination controls will be rendered here -->
                </div>
            </div>
        </main>
    </div>

    <!-- Loading Overlay -->
    <div id="loading-overlay" class="loading-overlay" style="display: none;">
        <div class="loading-spinner">
            <div class="spinner"></div>
            <p>Loading...</p>
        </div>
    </div>

    <!-- Edit Quote Modal -->
    <div id="editQuoteModal" class="modal" style="display: none;">
        <div class="modal-content">
            <div class="modal-header">
                <h2>Edit Quote Details</h2>
                <span class="close" onclick="quotesManager.closeEditModal()">&times;</span>
            </div>
            <div class="modal-body">
                <form id="editQuoteForm" onsubmit="quotesManager.saveQuoteEdit(event)">
                    <div class="form-group">
                        <label for="editQuoteName">Quote Name</label>
                        <input type="text" id="editQuoteName" required>
                    </div>
                    <div class="form-group">
                        <label for="editQuoteClient">Client Name</label>
                        <input type="text" id="editQuoteClient" placeholder="Enter client name">
                    </div>
                    <div class="form-group">
                        <label for="editQuoteLocation">Event Location</label>
                        <input type="text" id="editQuoteLocation" placeholder="Enter event location">
                    </div>
                    <div class="form-group">
                        <label class="checkbox-label">
                            <input type="checkbox" id="editQuoteBooked">
                            <span>Mark as Booked</span>
                        </label>
                    </div>
                    <div class="modal-buttons">
                        <button type="button" class="secondary-button" onclick="quotesManager.closeEditModal()">Cancel</button>
                        <button type="submit" class="primary-button">Save Changes</button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <!-- Share Quote Modal -->
    <div id="shareQuoteModal" class="modal" style="display: none;">
        <div class="modal-content share-modal-content">
            <div class="modal-header">
                <h2>Share Quote</h2>
                <span class="close" onclick="quotesManager.closeShareModal()">&times;</span>
            </div>
            <div class="modal-body">
                <p class="share-quote-name" id="shareQuoteName"></p>
                
                <!-- Add New Share -->
                <div class="share-add-section">
                    <h3>Share with User</h3>
                    <div class="share-user-select-container">
                        <div class="share-user-dropdown">
                            <input type="text" id="shareUserSearch" class="share-user-search" placeholder="Search users..." autocomplete="off">
                            <div id="shareUserDropdown" class="share-user-dropdown-list" style="display: none;">
                                <!-- Users will be populated here -->
                            </div>
                        </div>
                        <input type="hidden" id="selectedShareUserId">
                        <span id="selectedUserName" class="selected-user-name"></span>
                    </div>
                    
                    <div class="share-access-level">
                        <label>Access Level:</label>
                        <div class="access-level-options">
                            <label class="radio-label">
                                <input type="radio" name="accessLevel" value="read" checked>
                                <span class="radio-text">
                                    <strong>Read Only</strong>
                                    <small>Can view but not edit</small>
                                </span>
                            </label>
                            <label class="radio-label">
                                <input type="radio" name="accessLevel" value="full">
                                <span class="radio-text">
                                    <strong>Full Access</strong>
                                    <small>Can view and edit</small>
                                </span>
                            </label>
                        </div>
                    </div>
                    
                    <button type="button" class="primary-button share-add-btn" onclick="quotesManager.addShare()">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M16 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"></path>
                            <circle cx="8.5" cy="7" r="4"></circle>
                            <line x1="20" y1="8" x2="20" y2="14"></line>
                            <line x1="23" y1="11" x2="17" y2="11"></line>
                        </svg>
                        Add User
                    </button>
                </div>
                
                <!-- Current Shares -->
                <div class="share-current-section">
                    <h3>Currently Shared With</h3>
                    <div id="sharedUsersList" class="shared-users-list">
                        <!-- Shared users will be populated here -->
                        <p class="no-shares-message">Not shared with anyone yet</p>
                    </div>
                </div>
                
                <div class="modal-buttons">
                    <button type="button" class="secondary-button" onclick="quotesManager.closeShareModal()">Done</button>
                </div>
            </div>
        </div>
    </div>

    <script src="toasts.js"></script>
    <script src="a11y.js"></script>
    <script src="modals.js"></script>
    <script src="shell.js"></script>
    <script src="lumdash-integration.js"></script>
    <script src="quotes.js"></script>
</body>
</html>
