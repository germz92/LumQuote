<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calendar - LumQuote</title>
    <link rel="stylesheet" href="design-tokens.css">
    <link rel="stylesheet" href="components.css">
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="phase2.css">
    <link rel="stylesheet" href="phase4.css">
    <link rel="stylesheet" href="phase5.css">
    <link rel="icon" href="/assets/logo.png" type="image/png">
</head>
<body data-app-page="calendar" data-app-title="Calendar" data-app-subtitle="Visual schedule of all saved quotes" data-app-show-back="true">
    <div class="container">
        <main class="main-content">
            <div class="calendar-section">
                <div class="calendar-panel">
                <div class="calendar-controls">
                    <button class="nav-btn" id="prevMonth" aria-label="Previous month">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <polyline points="15,18 9,12 15,6"></polyline>
                        </svg>
                    </button>
                    <h2 id="currentMonth" class="month-title">Loading...</h2>
                    <button class="nav-btn" id="nextMonth" aria-label="Next month">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <polyline points="9,18 15,12 9,6"></polyline>
                        </svg>
                    </button>
                </div>

                <div id="calendarEmptyBanner" class="calendar-empty-banner" style="display: none;"></div>

                <div id="calendarFrame" class="calendar-frame">
                    <div id="calendarSkeleton" class="calendar-skeleton" aria-hidden="true"></div>

                    <div class="calendar-header">
                        <div class="day-header">Sun</div>
                        <div class="day-header">Mon</div>
                        <div class="day-header">Tue</div>
                        <div class="day-header">Wed</div>
                        <div class="day-header">Thu</div>
                        <div class="day-header">Fri</div>
                        <div class="day-header">Sat</div>
                    </div>

                    <div id="calendarGrid" class="calendar-grid">
                        <!-- Calendar days will be generated here -->
                    </div>
                </div>

                <div class="calendar-legend">
                    <div class="legend-item">
                        <div class="legend-color quote-event"></div>
                        <span>Quote Events</span>
                    </div>
                    <div class="legend-item">
                        <div class="legend-color booked-event"></div>
                        <span>Booked Events</span>
                    </div>
                    <p class="legend-note">Click on any event to view quote details</p>
                </div>
                </div>
            </div>
        </main>
    </div>

    <!-- Loading Overlay -->
    <div id="loading-overlay" class="loading-overlay" style="display: none;">
        <div class="loading-spinner">
            <div class="spinner"></div>
            <p>Loading calendar...</p>
        </div>
    </div>

    <!-- Event Tooltip -->
    <div id="eventTooltip" class="event-tooltip" style="display: none;">
        <div class="tooltip-content">
            <div class="tooltip-header">
                <h3 id="tooltipTitle">Quote Title</h3>
                <button class="tooltip-close">&times;</button>
            </div>
            <div class="tooltip-body">
                <div class="tooltip-info">
                    <span class="info-label">Client:</span>
                    <span id="tooltipClient">-</span>
                </div>
                <div class="tooltip-info">
                    <span class="info-label">Total:</span>
                    <span id="tooltipTotal">$0</span>
                </div>
                <div class="tooltip-info">
                    <span class="info-label">Services:</span>
                    <span id="tooltipServices">0</span>
                </div>
                <div class="tooltip-info">
                    <span class="info-label">Days:</span>
                    <span id="tooltipDays">0</span>
                </div>
            </div>
            <div class="tooltip-actions">
                <button class="tooltip-btn primary" id="openQuoteBtn">Open Quote</button>
                <button class="tooltip-btn secondary" id="toggleBookedBtn">Mark as Booked</button>
                <button class="tooltip-btn secondary" id="toggleArchiveBtn">Archive</button>
            </div>
        </div>
    </div>

    <script src="toasts.js"></script>
    <script src="a11y.js"></script>
    <script src="modals.js"></script>
    <script src="shell.js"></script>
    <script src="lumdash-integration.js"></script>
    <script src="calendar.js"></script>
</body>
</html>
